        <p style="text-align: center;">All fields are required.</p>
        <hr>
        <fieldset style="width: fit-content; margin: 0 auto;">
            <legend>Register</legend>
            <label for="full name">Full Name:</label>
            <input type="text" name="full name" placeholder="Full Name" id="full name">
            <br><br>
            <label for="email">Email:</label>
            <input type="email" name="email" placeholder="Email" id="email">
            <br><br>
            <label for="password">Password:</label>
            <input type="password" name="password" placeholder="Password" id="password">
            <br><br>
            <label>Gender:</label><br>
            <input type="radio" name="gender" value="male" id="male"> <label for="male">Male</label>
            <input type="radio" name="gender" value="female" id="female"> <label for="female">Female</label>
            <br><br>
            <label>Hobbies:</label>
            <br>
            <input type="checkbox" name="hobbies" value="gardening" id="gardening"> <label
                for="gardening">Gardening</label>
            <input type="checkbox" name="hobbies" value="painting" id="painting"> <label for="painting">Painting</label>
            <input type="checkbox" name="hobbies" value="reading" id="reading"> <label for="reading">Reading</label>
            <input type="checkbox" name="hobbies" value="sports" id="sports"> <label for="sports">Sports</label>
            <input type="checkbox" name="hobbies" value="swimming" id="swimming"> <label for="swimming">Swimming</label>
            <br><br>
            <label for="">Country:</label><br>
            <select name="" id="">
                <option value="none">None</option>
                <option value="pakistan">Pakistan</option>
                <option value="china">China</option>
                <option value="soudia Arabia">Soudia Arabia</option>
                <option value="united arab amirates">United Arab Amirates</option>
                <option value="america">America</option>
                <option value="russia">Russia</option>

                <option value="korea">Korea</option>
                <option value="turkey">Turkey</option>
                <option value="nepal">Nepal</option>
            </select>
            <br><br>
            <label for="dob">DOB:</label><br>
            <input type="date" name="dob" id="dob">
            <br><br>
            <label for="">Upload your photo:</label><br>
            <input type="file" name="" id="">
            <br><br>
